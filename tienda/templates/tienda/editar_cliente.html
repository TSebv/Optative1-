{% extends "tienda/base.html" %}

{% block title %}Editar Cliente{% endblock %}

{% block content %}
    <h1>Editar Cliente</h1>

    <a href="{% url 'tienda:lista_clientes' %}">Volver</a>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>
{% endblock %}
