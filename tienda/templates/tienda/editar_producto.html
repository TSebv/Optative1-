{% extends "tienda/base.html" %}
{% block title %}Editar: {{ producto.nombre }}{% endblock %}

{% block content %}
<h1>Editar producto</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Actualizar</button>
</form>
<p>
    <a href="{% url 'tienda:detalle_producto' producto.pk %}">Volver al detalle</a>
</p>
{% endblock %}
